<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kejutan Untuk Teman Terdekat</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #ffb6c1, #ffd6e8);
      overflow:hidden;
    }

    .container{
      text-align:center;
      background:white;
      padding:40px;
      border-radius:25px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
      width:90%;
      max-width:500px;
      animation: muncul 1s ease;
    }

    h1{
      color:#ff4f81;
      margin-bottom:20px;
    }

    p{
      color:#555;
      margin-bottom:25px;
      font-size:18px;
    }

    button{
      padding:15px 30px;
      border:none;
      border-radius:30px;
      background:#ff4f81;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#ff1f63;
      transform:scale(1.05);
    }

    .surprise{
      margin-top:30px;
      display:none;
      animation:fadeIn 1s ease;
    }

    .surprise img{
      width:220px;
      border-radius:20px;
      margin-bottom:20px;
    }

    .sweet-text{
      font-size:20px;
      color:#ff4f81;
      font-weight:bold;
      line-height:1.5;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes muncul{
      from{
        opacity:0;
        transform:scale(0.8);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Haiii my bestiee 💖</h1>
    <p>Aku ada sesuatu nih buat kamu...</p>

    <button onclick="showSurprise()">
      Klik Di Sini yaa ✨
    </button>

    <div class="surprise" id="surprise">
      <img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif" alt="Bunga">

      <div class="sweet-text">
        Terima kasih sudah selalu ada 💐 <br><br>
        Kamu itu seperti bunga yang bikin hari jadi lebih indah. 🌸 <br><br>
        Semoga senyummu selalu ada dan kebahagiaan selalu menemani kamu jangan lupa traktir terus bestie mu ini,, lope sekebon ✨
      </div>
    </div>
  </div>

  <script>
    function showSurprise(){
      document.getElementById("surprise").style.display = "block";
    }
  </script>

</body>
</html>
